name: Bug report
description: Something broken in the CLI, registry, docs site, or a template
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Include steps to reproduce and your environment.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `npx @letterkit/cli@latest theme add grundy`
        2. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: cli-version
    attributes:
      label: CLI version
      placeholder: "0.0.1"

  - type: dropdown
    id: package-manager
    attributes:
      label: Package manager
      options:
        - pnpm
        - npm
        - yarn
        - bun

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "20.x"

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste terminal output or attach screenshots
